<div class="app-layout">
  @if(showNavBar){
  <app-nav-bar [navItems]="navItems"></app-nav-bar>
  }

  <main class="main-content" [class.fullscreen]="!showNavBar">
    <header class="top-bar" *ngIf="showNavBar && userService.getUserInfo()">
      <span class="username">👤 {{ userService.getUserInfo()?.Username }}</span>
    </header>
    <router-outlet></router-outlet>
  </main>
</div>
